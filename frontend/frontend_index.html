<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregnancy Health Monitor | Welcome</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>🤰 Pregnancy Health Monitor</h1>
                    <p>AI-Powered Pregnancy Care Assistant</p>
                </div>
                
                <div class="auth-tabs">
                    <button class="tab-btn active" onclick="showTab('login')">Login</button>
                    <button class="tab-btn" onclick="showTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="auth-form active">
                    <h2>Welcome Back!</h2>
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="login-email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="login-password" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="auth-form">
                    <h2>Create Account</h2>
                    <form onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="reg-name" required placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Aadhar Number (12 digits)</label>
                            <input type="text" id="reg-aadhar" required maxlength="12" pattern="\d{12}" placeholder="123456789012">
                        </div>
                        <div class="form-group">
                            <label>Location</label>
                            <input type="text" id="reg-location" required placeholder="City, State">
                        </div>
                        <div class="form-group">
                            <label>Phone Number (10 digits)</label>
                            <input type="tel" id="reg-phone" required maxlength="10" pattern="\d{10}" placeholder="9876543210">
                        </div>
                        <div class="form-group">
                            <label>Pregnancy Month (1-9)</label>
                            <input type="number" id="reg-month" required min="1" max="9" placeholder="Enter current month">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="reg-email" required placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="reg-password" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <button type="submit" class="btn-primary">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
