<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pregnancy Symptom Checker</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<h1>AI Based Symptom Checker for Late Pregnancy</h1>
<p>Early risk detection for pregnant women</p>
</header>

<div class="container">
<div class="card">
<h2>Enter Symptoms</h2>
<label><input type="checkbox" id="headache"> Severe Headache</label><br><br>
<label><input type="checkbox" id="swelling"> Swelling in Feet</label><br><br>
<label><input type="checkbox" id="bleeding"> Vaginal Bleeding</label><br><br>
<label><input type="checkbox" id="bp"> High Blood Pressure</label><br><br>
<label><input type="checkbox" id="movement"> Reduced Baby Movement</label><br><br>
<button onclick="checkSymptoms()">Analyze Symptoms</button>

<div id="result" class="result"></div>
</div>
<div class="card">
<h2>Baby Kick Tracker</h2>
<p>Enter number of baby movements in last hour:</p>
<input type="number" id="kicks" placeholder="Number of kicks">
<button onclick="checkKicks()">Check Movement</button>
<div id="kickResult" class="result"></div>
</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
